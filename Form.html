<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SariSari Store Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
    rel="stylesheet" 
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" 
    crossorigin="anonymous">
</head>
<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">SariSari</a>
    </div>
  </nav>

  <!-- Main content -->
  <div class="container mt-4">
    <div class="row">
      <!-- On mobile: full width; on desktop: centered column -->
      <div class="col-12 col-md-6 offset-md-3">
        <h1 class="text-center mb-4">Store Calculator</h1>
        <form method="POST" action="/calculate" class="card p-4 shadow-sm">

          <div class="mb-3">
            <label for="product" class="form-label">Product</label>
            <select id="product" name="product" class="form-select">
              <option value="item1">Item 1</option>
              <option value="item2">Item 2</option>
              <option value="item3">Item 3</option>
            </select>
          </div>

          <div class="mb-3">
            <label for="quantity" class="form-label">Quantity</label>
            <input type="number" id="quantity" name="quantity" min="1" required class="form-control">
          </div>

          <div class="mb-3">
            <label for="notes" class="form-label">Notes</label>
            <textarea id="notes" name="notes" rows="3" class="form-control"></textarea>
          </div>

          <button type="submit" class="btn btn-primary w-100">Calculate</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script 
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" 
    integrity="sha384-ENjdO4Dr2bkBIFxQpeoYz1DhZ9l+U5kQ4l+2kz5n0e5z5z5z5z5z5z5z5z5z5z5z" 
    crossorigin="anonymous"></script>
</body>
</html>

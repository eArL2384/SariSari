<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{title}}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="container mt-4">
    <h2>{{title}}</h2>
    <form method="post" action="{{ url_for('add_to_cart') }}" class="card p-3 shadow-sm">
      <select name="chosen" class="form-select mb-2">
        {% for p in results %}
          <option value="{{p['product']}}">{{p['product']}} (₱{{p['price']}})</option>
        {% endfor %}
      </select>

      <input type="hidden" name="quantity" id="quantity" value="">
      <p>Quantity: <span id="qtyDisplay"></span></p>

      <!-- Numpad -->
      <div class="d-grid gap-2">
        {% for row in [[1,2,3],[4,5,6],[7,8,9]] %}
          <div class="d-flex justify-content-center">
            {% for n in row %}
              <button type="button" class="btn btn-outline-secondary m-1" onclick="addNumber({{n}})">{{n}}</button>
            {% endfor %}
          </div>
        {% endfor %}
        <div class="d-flex justify-content-center">
          <button type="button" class="btn btn-outline-secondary m-1" onclick="addNumber(0)">0</button>
          <button type="button" class="btn btn-outline-danger m-1" onclick="clearNumber()">Clear</button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 mt-2">Add to Cart</button>
    </form>

    <form action="{{ url_for('home') }}" class="mt-2">
      <button type="submit" class="btn btn-secondary w-100">Back</button>
    </form>
  </div>

  <script>
    function addNumber(n) {
      let qtyField = document.getElementById("quantity");
      qtyField.value = qtyField.value + n;
      document.getElementById("qtyDisplay").innerText = qtyField.value;
    }
    function clearNumber() {
      document.getElementById("quantity").value = "";
      document.getElementById("qtyDisplay").innerText = "";
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
